<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Adek ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --accent: #e5b3a3;
      --bg: #fffaf9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      font-family: 'Quicksand', sans-serif;
      overflow-x: hidden;
      color: #4a4a4a;
    }

    .container {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.9);
      padding: 35px;
      border-radius: 25px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: 3rem;
      color: var(--accent);
    }

    .timer {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }

    .time-box {
      background: white;
      padding: 10px;
      border-radius: 10px;
      min-width: 60px;
    }

    .time-num { font-weight: bold; }
    .time-label { font-size: 0.7rem; color: var(--accent); }

    .hidden { display: none; }

    .playlist-wrapper {
      margin: 20px 0;
    }

    .btn-heart {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    .spotify-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.85rem;
      color: #b58373;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- COUNTDOWN -->
  <div id="countdown" class="card">
    <h1>Halo Adek...</h1>
    <p>Mas lagi nunggu hari spesial kamu ❤️</p>

    <div class="timer">
      <div class="time-box"><span id="d">00</span><div class="time-label">Hari</div></div>
      <div class="time-box"><span id="h">00</span><div class="time-label">Jam</div></div>
      <div class="time-box"><span id="m">00</span><div class="time-label">Menit</div></div>
      <div class="time-box"><span id="s">00</span><div class="time-label">Detik</div></div>
    </div>

    <p style="font-size:0.8rem;">"Sabar ya Dek..."</p>
  </div>

  <!-- BIRTHDAY -->
  <div id="bday" class="card hidden">
    <h1>Happy Birthday ❤️</h1>

    <p style="margin:15px 0;">
      Selamat ulang tahun ke-18 ya Dek... <br>
      Mas selalu bangga sama kamu 💖
    </p>

    <div id="text">Klik tombol di bawah ya...</div>

    <!-- SPOTIFY -->
    <div class="playlist-wrapper">
      <iframe style="border-radius:12px"
        src="https://open.spotify.com/embed/playlist/37i9dQZF1DX66m0A5pKUvY"
        width="100%" height="152" frameBorder="0"
        allow="autoplay; clipboard-write; encrypted-media;">
      </iframe>
    </div>

    <a href="https://open.spotify.com/playlist/37i9dQZF1DX66m0A5pKUvY" target="_blank" class="spotify-link">
      🎧 Playlist ini Mas pilih khusus buat Adek...
    </a>

    <br>
    <button class="btn-heart" onclick="klik()">Klik Dengan Cinta ❤️</button>
  </div>

</div>

<script>
const target = new Date("April 14, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = target - now;

  if (diff <= 0) {
    document.getElementById("countdown").classList.add("hidden");
    document.getElementById("bday").classList.remove("hidden");
  } else {
    document.getElementById("d").innerText = Math.floor(diff / (1000*60*60*24));
    document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000);
  }
}, 1000);

function klik(){
  const msg = [
    "Mas bangga sama Adek ❤️",
    "Adek pasti bisa masuk Unpad 🎓",
    "Jangan nyerah ya...",
    "Adek itu spesial banget buat Mas 💖",
    "Semua impian Adek pasti tercapai ✨"
  ];

  document.getElementById("text").innerText =
    msg[Math.floor(Math.random()*msg.length)];
}
</script>

</body>
</html>
