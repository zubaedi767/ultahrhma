<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Adek ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #fffaf9;
      font-family: 'Quicksand', sans-serif;
      text-align: center;
      padding: 20px;
      color: #555;
    }

    .card {
      max-width: 450px;
      margin: auto;
      padding: 30px;
      border-radius: 25px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      color: #e5b3a3;
      font-size: 3rem;
    }

    .timer {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }

    .box {
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      min-width: 60px;
    }

    .hidden { display: none; }

    .btn {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      background: #e5b3a3;
      color: white;
      cursor: pointer;
    }

    .spotify-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.85rem;
      color: #b58373;
      text-decoration: none;
    }
  </style>
</head>

<body>

<!-- COUNTDOWN -->
<div id="countdown" class="card">
  <h1>Halo Adek...</h1>
  <p>Mas lagi nunggu hari spesial kamu ❤️</p>

  <div class="timer">
    <div class="box"><span id="d">00</span><br>Hari</div>
    <div class="box"><span id="h">00</span><br>Jam</div>
    <div class="box"><span id="m">00</span><br>Menit</div>
    <div class="box"><span id="s">00</span><br>Detik</div>
  </div>
</div>

<!-- BIRTHDAY -->
<div id="bday" class="card hidden">
  <h1>Happy Birthday ❤️</h1>

  <p>
    Selamat ulang tahun ke-18 ya Dek... <br>
    Mas selalu bangga sama kamu 💖
  </p>

  <p id="text">Klik tombol di bawah ya...</p>

  <!-- SPOTIFY (PASTI JALAN) -->
  <iframe style="border-radius:12px" 
    src="https://open.spotify.com/embed/playlist/37i9dQZF1DX4dyzvuaRJ0n"
    width="100%" height="152" frameborder="0"
    allow="autoplay; clipboard-write; encrypted-media;">
  </iframe>

  <a href="https://open.spotify.com/playlist/37i9dQZF1DX4dyzvuaRJ0n" target="_blank" class="spotify-link">
    🎧 Playlist ini Mas pilih khusus buat Adek...
  </a>

  <br>
  <button class="btn" onclick="klik()">Klik Dengan Cinta ❤️</button>
</div>

<script>
const target = new Date("April 14, 2026 00:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const diff = target - now;

  if (diff <= 0) {
    document.getElementById("countdown").classList.add("hidden");
    document.getElementById("bday").classList.remove("hidden");
  } else {
    document.getElementById("d").innerText = Math.floor(diff / (1000*60*60*24));
    document.getElementById("h").innerText = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
    document.getElementById("m").innerText = Math.floor((diff%(1000*60*60))/(1000*60));
    document.getElementById("s").innerText = Math.floor((diff%(1000*60))/1000);
  }
}, 1000);

function klik(){
  const msg = [
    "Mas bangga sama Adek ❤️",
    "Adek pasti bisa masuk Unpad 🎓",
    "Jangan nyerah ya...",
    "Adek itu spesial banget buat Mas 💖",
    "Semua impian Adek pasti tercapai ✨"
  ];

  document.getElementById("text").innerText =
    msg[Math.floor(Math.random()*msg.length)];
}
</script>

</body>
</html>
